<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>班表總覽｜Shift Guardian</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <a href="admin.html" style="text-decoration:none;"><div class="brand"><span class="dot"></span><span id="brandName">Shift Guardian</span></div></a>
    <div class="nav-links">
      <a href="index.html" class="active">公開月曆</a>
      <a href="employee.html" id="navEmployeeLink">員工登入</a>
    </div>
  </div>

  <div class="card">
    <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px;">
      <h2 style="margin:0;">月曆班表</h2>
      <div class="btn-row" style="margin-top:0;">
        <button class="btn btn-secondary" id="prevMonth">‹ 上一頁</button>
        <span id="monthLabel" style="font-family: var(--font-mono); align-self:center; padding:0 6px;"></span>
        <button class="btn btn-secondary" id="nextMonth">下一頁 ›</button>
      </div>
    </div>

    <div id="demoBadge" style="display:none; margin-top:8px;">
      <span class="status-pill status-pending">示範資料，非實際排班</span>
    </div>
    <div id="statusLine" class="hint" style="margin:8px 0 0;"></div>

    <div id="calWeeks" style="margin-top:14px;"></div>

    <div class="legend">
      <span><span class="swatch" style="background:var(--dawn)"></span>日間班（A1/A2/B）</span>
      <span><span class="swatch" style="background:var(--dusk)"></span>夜間班（C1/C2/D）</span>
      <span><span class="swatch" style="background:var(--danger)"></span>休 = 排休</span>
      <span><span class="swatch" style="background:var(--success)"></span>特 = 特休（已核准）</span>
      <span><span class="swatch" style="background:var(--text-dim)"></span>待 = 待主管核定</span>
    </div>
  </div>

  <div class="card" id="warningCard" style="display:none;">
    <h2>人力配置提醒</h2>
    <div id="warningList"></div>
  </div>

  <div class="card">
    <h2>特休使用總表</h2>
    <div id="leaveTable" class="row-list"></div>
  </div>

  <div class="card">
    <h2>特休申請紀錄</h2>
    <div class="hint" style="margin-bottom:10px;">誰在什麼時候提出申請、主管什麼時候核准。</div>
    <div id="leaveLog" class="row-list"></div>
  </div>

  <div class="hint" style="text-align:center; margin-top:20px; opacity:0.5;">v<span id="versionFooter"></span></div>

</div>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/github-api.js"></script>
<script src="js/leave-calc.js"></script>
<script src="js/demo-data.js"></script>
<script>
// navIndex: 0=展示頁1, 1=展示頁2, 2+ = 真實月份（offset = navIndex-2）
// 若這台裝置已有員工登入紀錄，直接從「本月」開始，不看展示頁
let navIndex = hasEmployeeSessionSync() ? 2 : 0;

function hasEmployeeSessionSync() {
  return !!localStorage.getItem(LS_KEY_EMPLOYEE_SESSION);
}

function hasEmployeeSession() {
  return !!localStorage.getItem(LS_KEY_EMPLOYEE_SESSION);
}

async function loadBrand() {
  const config = await readJSON("data/config.json").catch(() => null);
  document.getElementById("brandName").textContent = (config && config.storeName) ? config.storeName : "Shift Guardian";
}
loadBrand();

async function updateNavEmployeeLabel() {
  const saved = localStorage.getItem(LS_KEY_EMPLOYEE_SESSION);
  if (!saved) return;
  try {
    const session = JSON.parse(saved);
    const employees = (await readJSON("data/employees.json").catch(() => [])) || [];
    const emp = employees.find((e) => e.id === session.employeeId);
    if (emp) {
      document.getElementById("navEmployeeLink").textContent = emp.alias || emp.firstName || "員工登入";
    }
  } catch (e) {}
}
updateNavEmployeeLabel();
initTopbarShrink();

async function loadView() {
  document.getElementById("demoBadge").style.display = "none";

  if (navIndex === 0 || navIndex === 1) {
    const isDemo1 = navIndex === 0;
    const monthKey = isDemo1 ? DEMO1_MONTH : DEMO2_MONTH;
    const schedule = isDemo1 ? DEMO1_SCHEDULE : DEMO2_SCHEDULE;
    document.getElementById("monthLabel").textContent = `${monthLabel(monthKey)}（示範 ${isDemo1 ? 1 : 2}）`;
    document.getElementById("demoBadge").style.display = "block";
    document.getElementById("statusLine").textContent = isDemo1
      ? "示範情境：6位員工排休大致錯開，另有2筆已核准的特休。"
      : "示範情境：多位員工排休重疊，下方會列出人力短缺的日期與人員。";

    const shortageDays = computeShortageDays(monthKey, DEMO_EMPLOYEES, schedule);
    renderCalendar(monthKey, DEMO_EMPLOYEES, schedule, true, shortageDays);
    renderWarnings(monthKey, DEMO_EMPLOYEES, schedule, shortageDays);
    renderLeaveTable(DEMO_EMPLOYEES, { leavePolicy: DEFAULT_LEAVE_POLICY }, schedule, true);
    renderLeaveLog(DEMO_EMPLOYEES, schedule, true);
    document.getElementById("prevMonth").disabled = isDemo1;
    return;
  }

  document.getElementById("prevMonth").disabled = false;
  const offset = navIndex - 2;
  const monthKey = currentMonthKey(offset);
  document.getElementById("monthLabel").textContent = monthLabel(monthKey);

  const [employees, config, schedule] = await Promise.all([
    readJSON("data/employees.json").catch(() => []),
    readJSON("data/config.json").catch(() => null),
    readJSON(`data/schedule-${monthKey}.json`).catch(() => null),
  ]);

  const activeEmployees = (employees || []).filter((e) => e.status === "active");
  const statusEl = document.getElementById("statusLine");
  if (!schedule) {
    statusEl.textContent = "本月尚未建立排休表。";
  } else {
    statusEl.textContent = schedule.status === "locked"
      ? `本月排休已由主管核定並鎖定（核定時間：${schedule.lockedAt || "-"}）`
      : "本月排休仍在協調中，尚未由主管最終核定。";
  }

  const reveal = hasEmployeeSession();
  const shortageDays = computeShortageDays(monthKey, activeEmployees, schedule);
  renderCalendar(monthKey, activeEmployees, schedule, reveal, shortageDays);
  renderWarnings(monthKey, activeEmployees, schedule, shortageDays);
  renderLeaveTable(activeEmployees, config, schedule, reveal);
  renderLeaveLog(activeEmployees, schedule, reveal);
}

const WEEKDAY_LABELS = ["日", "一", "二", "三", "四", "五", "六"];

function displayLabel(emp, reveal) {
  const shiftName = getShiftLabel(emp.shift);
  if (reveal) return `${emp.alias || emp.lastName + emp.firstName}<br><span class="hint">${shiftName}</span>`;
  return `${shiftName}`;
}

// ---------- 計算短缺日期（回傳 { dayNum: [names...] } ），排除「免排班」人員 ----------
function computeShortageDays(monthKey, employees, schedule) {
  const result = {};
  if (!schedule) return result;
  const nDays = daysInMonth(monthKey);
  const schedulable = employees.filter((e) => !e.noSchedule);
  for (let d = 1; d <= nDays; d++) {
    const dateStr = `${monthKey}-${pad2(d)}`;
    const names = [];
    for (const emp of schedulable) {
      const off = (schedule.days?.[emp.id] || []).includes(dateStr);
      const approvedLeave = (schedule.specialLeave || []).some(
        (r) => r.employeeId === emp.id && r.date === dateStr && r.status === "approved"
      );
      if (off || approvedLeave) names.push(emp.alias || emp.lastName + emp.firstName);
    }
    if (names.length >= MIN_STAFF_WARNING_THRESHOLD) result[d] = names;
  }
  return result;
}

function renderCalendar(monthKey, employees, schedule, reveal, shortageDays) {
  const nDays = daysInMonth(monthKey);
  const [y, m] = monthKey.split("-").map(Number);
  const container = document.getElementById("calWeeks");
  container.innerHTML = "";

  if (employees.length === 0) {
    container.innerHTML = `<div class="hint" style="padding:14px 0;">尚無員工資料</div>`;
    return;
  }

  // 建立完整的週格線：從月初那週的週日，補到月底那週的週六，每週固定7欄
  const firstOfMonth = new Date(y, m - 1, 1);
  const lastOfMonth = new Date(y, m - 1, nDays);
  const gridStart = new Date(firstOfMonth);
  gridStart.setDate(gridStart.getDate() - gridStart.getDay());
  const gridEnd = new Date(lastOfMonth);
  gridEnd.setDate(gridEnd.getDate() + (6 - gridEnd.getDay()));

  const weeks = [];
  let cursorDate = new Date(gridStart);
  while (cursorDate <= gridEnd) {
    const week = [];
    for (let i = 0; i < 7; i++) {
      week.push(new Date(cursorDate));
      cursorDate.setDate(cursorDate.getDate() + 1);
    }
    weeks.push(week);
  }

  weeks.forEach((week, weekIndex) => {
    const block = document.createElement("div");
    block.className = "cal-scroll";
    block.style.marginBottom = "18px";

    const inMonthDates = week.filter((dt) => dt.getMonth() === m - 1);
    const rangeLabel = inMonthDates.length
      ? `${inMonthDates[0].getMonth() + 1}/${inMonthDates[0].getDate()} － ${inMonthDates[inMonthDates.length - 1].getMonth() + 1}/${inMonthDates[inMonthDates.length - 1].getDate()}`
      : "";
    const title = document.createElement("h3");
    title.textContent = `第 ${weekIndex + 1} 週　${rangeLabel}`;
    container.appendChild(title);

    let thead = "<thead><tr><th>員工</th>";
    for (const dt of week) {
      const inMonth = dt.getMonth() === m - 1;
      const dow = dt.getDay();
      const isShortage = inMonth && shortageDays && shortageDays[dt.getDate()];
      const dayLabelClass = isShortage ? "date-blink" : (inMonth ? "" : "date-outmonth");
      thead += `<th class="${isShortage ? "col-shortage" : ""}"><span class="${dayLabelClass}">${dt.getDate()}</span><br><span class="hint">${WEEKDAY_LABELS[dow]}</span></th>`;
    }
    thead += "</tr></thead>";

    let tbody = "<tbody>";
    for (const emp of employees) {
      const offDays = (schedule?.days?.[emp.id]) || [];
      const specialLeave = (schedule?.specialLeave || []).filter((r) => r.employeeId === emp.id);
      const supportEntries = (schedule?.support || []).filter((r) => r.employeeId === emp.id);
      tbody += `<tr><td class="emp-name">${displayLabel(emp, reveal)}</td>`;
      for (const dt of week) {
        const inMonth = dt.getMonth() === m - 1;
        if (!inMonth) {
          tbody += `<td class="cell-outmonth">${dt.getDate()}</td>`;
          continue;
        }
        const dayNum = dt.getDate();
        const dateStr = `${monthKey}-${pad2(dayNum)}`;
        const isOff = offDays.includes(dateStr);
        const leaveReq = specialLeave.find((r) => r.date === dateStr);
        const supportReq = supportEntries.find((r) => r.date === dateStr);
        let cellHtml = "";
        if (leaveReq) {
          if (leaveReq.status === "approved") cellHtml = `<span class="badge annual">特</span>`;
          else if (leaveReq.status === "pending") cellHtml = `<span class="badge pending">待</span>`;
        } else if (isOff) {
          cellHtml = `<span class="badge off">休</span>`;
        } else if (supportReq) {
          cellHtml = `<span class="badge support">支<br>${supportReq.supportShift}</span>`;
        }
        const shortageCellClass = shortageDays && shortageDays[dayNum] ? " col-shortage" : "";
        tbody += `<td class="${shortageCellClass}">${cellHtml}</td>`;
      }
      tbody += "</tr>";
    }
    tbody += "</tbody>";

    const table = document.createElement("table");
    table.className = "cal";
    table.innerHTML = thead + tbody;
    block.appendChild(table);
    container.appendChild(block);
  });
}

// ---------- 人力配置提醒（同一天請休人數 >= 門檻） ----------
function renderWarnings(monthKey, employees, schedule, shortageDays) {
  const card = document.getElementById("warningCard");
  const listEl = document.getElementById("warningList");
  if (!schedule || employees.length === 0 || !shortageDays || Object.keys(shortageDays).length === 0) {
    card.style.display = "none";
    return;
  }
  card.style.display = "block";
  const [, m] = monthKey.split("-");
  const days = Object.keys(shortageDays).map(Number).sort((a, b) => a - b);
  listEl.innerHTML = days.map((d) =>
    `<div style="color:var(--danger); font-size:14px; padding:4px 0;">
      ⚠ ${Number(m)}/${d} 人力低於最低配置人力：當天排休有 ${shortageDays[d].join("、")}
    </div>`
  ).join("");
}

// ---------- 特休總表 ----------
function renderLeaveTable(employees, config, schedule, reveal) {
  const policy = config?.leavePolicy || DEFAULT_LEAVE_POLICY;
  const el = document.getElementById("leaveTable");
  if (employees.length === 0) {
    el.innerHTML = `<div class="hint">尚無員工資料</div>`;
    return;
  }
  el.innerHTML = employees
    .map((emp) => {
      const quota = calcAnnualLeaveQuota(emp.hireDate, policy);
      const used = schedule
        ? schedule.specialLeave?.filter((r) => r.employeeId === emp.id && r.status === "approved").length || 0
        : 0;
      const label = reveal
        ? `${emp.alias || emp.lastName + emp.firstName} <span class="meta">${getShiftLabel(emp.shift)}</span>`
        : `${getShiftLabel(emp.shift)}`;
      return `<div class="row-item">
        <div><strong>${label}</strong></div>
        <div class="meta">總額度 ${quota} 天 ｜ 已用 ${used} 天 ｜ 剩餘 <strong style="color:var(--success)">${Math.max(quota - used, 0)}</strong> 天</div>
      </div>`;
    })
    .join("");
}

// ---------- 特休申請紀錄（誰、何時提交、何時核准） ----------
function renderLeaveLog(employees, schedule, reveal) {
  const el = document.getElementById("leaveLog");
  const list = (schedule?.specialLeave || []).slice().sort((a, b) => (a.date < b.date ? 1 : -1));
  if (list.length === 0) {
    el.innerHTML = `<div class="hint">本月尚無特休申請紀錄</div>`;
    return;
  }
  el.innerHTML = list.map((r) => {
    const emp = employees.find((e) => e.id === r.employeeId);
    const name = reveal ? (emp ? (emp.alias || emp.lastName + emp.firstName) : r.employeeId) : (emp ? getShiftLabel(emp.shift) : "-");
    const statusLabel = { approved: "已核准", pending: "待審核", rejected: "已駁回" }[r.status] || r.status;
    const statusClass = { approved: "status-approved", pending: "status-pending", rejected: "status-rejected" }[r.status];
    const submitted = r.requestedAt ? new Date(r.requestedAt).toLocaleString("zh-TW") : "-";
    const decided = r.decidedAt ? new Date(r.decidedAt).toLocaleString("zh-TW") : "-";
    return `<div class="row-item">
      <div>
        <strong>${name}</strong> 申請 ${r.date}
        <div class="meta">提交時間：${submitted}　｜　核准時間：${decided}</div>
      </div>
      <span class="status-pill ${statusClass}">${statusLabel}</span>
    </div>`;
  }).join("");
}

document.getElementById("prevMonth").onclick = () => { if (navIndex > 0) { navIndex--; loadView(); } };
document.getElementById("nextMonth").onclick = () => { navIndex++; loadView(); };

loadView();
document.getElementById("versionFooter").textContent = APP_VERSION;
</script>
</body>
</html>
